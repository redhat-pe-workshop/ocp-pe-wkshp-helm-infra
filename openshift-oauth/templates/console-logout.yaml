apiVersion: config.openshift.io/v1
kind: Console
metadata:
  name: cluster
spec:
  authentication:
    logoutRedirect: "https://{{ .Values.keycloak.host }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/logout?client_id={{ .Values.oidc.clientId }}&post_logout_redirect_uri=https://console-openshift-console.{{ .Values.cluster.subdomain }}"
