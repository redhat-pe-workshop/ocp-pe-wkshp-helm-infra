apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.infraAppOfApps.name "namespace" .Values.argocd.namespace "syncWave" "3") }}
spec:
  destination:
    namespace: {{ .Values.argocd.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: argocd
    repoURL: https://{{ .Values.gitlab.host }}/rhdh/infra-app-of-apps.git
    targetRevision: main
    helm:
      valuesObject:
        gitlabHost: {{ .Values.gitlab.host }}
        gitopsNamespace: {{ .Values.argocd.namespace }}
        kafkaNamespace: {{ .Values.amqStreams.namespace }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
